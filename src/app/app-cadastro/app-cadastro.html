<div class="register-wrapper">

  <mat-card class="register-card">
    <mat-card-header class="register-header">
      <mat-card-title class="register-title">
        <mat-icon color="primary">build</mat-icon> Call the technician
      </mat-card-title>
      <mat-card-subtitle class="register-subtitle">
        Fill in the details below to open a support ticket
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="register-content">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Name</mat-label>
        <input matInput [(ngModel)]="name" placeholder="Your name">
        <mat-icon matSuffix>person</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" [(ngModel)]="email" placeholder="your@email.com">
        <mat-icon matSuffix>email</mat-icon>
      </mat-form-field>

      <!-- O bloco correto deve usar mat-select e mat-option (nunca a tag option comum) -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Complaints</mat-label>
        <mat-select [(ngModel)]="subject">
          <mat-option value="broken coffee machine">Broken coffee machine ☕</mat-option>
          <mat-option value="slow internet">Slow internet 🌐</mat-option>
          <mat-option value="computer won't turn on">Computer won't turn on 💻</mat-option>
          <mat-option value="other">Other issue...</mat-option>
        </mat-select>
      </mat-form-field>

      <button mat-flat-button color="primary" class="btn-submit-ticket" (click)="sendComplaint()">
        Submit Ticket 🚀
      </button>

    </mat-card-content>

    <mat-card-actions class="register-actions">
      <button mat-button routerLink="/users" class="btn-link-view">
        See the complaints. →
      </button>
    </mat-card-actions>
  </mat-card>

</div>
