<div class="signup-wrapper">

  <mat-card class="signup-card">
    <mat-card-header class="signup-header">
      <mat-card-title class="signup-title">
        <mat-icon color="primary">person_add</mat-icon> Create Account
      </mat-card-title>
    </mat-card-header>

    <mat-card-content class="signup-content">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Full Name</mat-label>
        <input matInput [(ngModel)]="name" placeholder="John Doe">
        <mat-icon matSuffix>person</mat-icon>
      </mat-form-field>


      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email Address</mat-label>
        <input matInput type="email" [(ngModel)]="email" placeholder="john@example.com">
        <mat-icon matSuffix>email</mat-icon>
      </mat-form-field>


      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" [(ngModel)]="password" placeholder="••••••••">
        <mat-icon matSuffix>lock</mat-icon>
      </mat-form-field>


      <div class="role-selection-group">
        <label class="role-label">Account Type:</label>
        <mat-radio-group [(ngModel)]="role" color="primary" class="radio-flex">
          <mat-radio-button value="user">Standard User 👤</mat-radio-button>
          <mat-radio-button value="technician">Technician 🛠️</mat-radio-button>
        </mat-radio-group>
      </div>

      <button mat-flat-button color="primary" class="btn-submit" (click)="createAccount()">
        Sign Up 🚀
      </button>

    </mat-card-content>

    <mat-card-actions class="signup-actions">
      <button mat-button routerLink="/user-login" class="btn-link">
        Already have an account? Log in
      </button>
    </mat-card-actions>
  </mat-card>

</div>
